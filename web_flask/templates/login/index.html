<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>
</head>
<body>
    <h1>홈페이지</h1>
    <!--템플릿 문서에서는 Jinja2 템플릿 엔진 사용
    데이터 출력, 조건문, 반복문, 템플릿 상속 등을 지원-->
    <!--데이터 출력:{{이름}}-->
    {% if user %}
    <p>{{user}}님 환영합니다.</p>
    <a href="/posts">게시글</a>
    <a href="/logout">로그아웃</a>
    {% else %}
    <p>로그인이 필요합니다.</p>
    <a href="/login">로그인</a>
    {% endif %}
    <div>
        <a href="/a">A 페이지 이동</a>
    </div>
</body>
</html>
